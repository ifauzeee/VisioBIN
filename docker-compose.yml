services:
  postgres:
    image: postgres:15-alpine
    container_name: visiobin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_HOST_PORT}:${DB_PORT}"
    volumes:
      - visiobin_pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./backend/migrations/002_maintenance_logs.sql:/docker-entrypoint-initdb.d/002_maintenance_logs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PORT: ${BACKEND_PORT}
    container_name: visiobin-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${DB_SSLMODE}
      JWT_SECRET: ${JWT_SECRET}
      API_KEY: ${API_KEY}
      PORT: ${BACKEND_PORT}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        CAMERA_STREAM_URL: ${CAMERA_STREAM_URL}
        PORT: ${DASHBOARD_PORT}
    container_name: visiobin-dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      CAMERA_STREAM_URL: ${CAMERA_STREAM_URL}
      NEXT_PUBLIC_CAMERA_STREAM_URL: ${CAMERA_STREAM_URL}
    ports:
      - "${DASHBOARD_PORT}:${DASHBOARD_PORT}"
    depends_on:
      - backend

  simulator:
    build:
      context: ./iot-simulator
      dockerfile: Dockerfile
    container_name: visiobin-simulator
    restart: unless-stopped
    environment:
      API_KEY: ${API_KEY}
      SIMULATOR_API_URL: ${SIMULATOR_API_URL}
      SIMULATOR_USER: ${SIMULATOR_USER}
      SIMULATOR_PASSWORD: ${SIMULATOR_PASSWORD}
      SIMULATOR_SCENARIO: ${SIMULATOR_SCENARIO}
    depends_on:
      - backend
    command:
      - "-url"
      - "${SIMULATOR_API_URL}"
      - "-interval"
      - "${SIMULATOR_INTERVAL}"
      - "-user"
      - "${SIMULATOR_USER}"
      - "-pass"
      - "${SIMULATOR_PASSWORD}"
      - "-scenario"
      - "${SIMULATOR_SCENARIO}"

  adminer:
    image: adminer
    container_name: visiobin-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:${ADMINER_CONTAINER_PORT}"
    depends_on:
      - postgres

volumes:
  visiobin_pgdata:
